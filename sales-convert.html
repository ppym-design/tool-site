<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>必要売上計算ツール｜プレシャスパートナーズツールサイト</title>

  <style>
    :root {
      --blue: #1d4ed8;
      --blue-dark: #0f2f6b;
      --blue-light: #eaf2ff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbeafe;
      --card: #ffffff;
      --bg: #f5f9ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f5f9ff 0%, #ffffff 55%, #f8fafc 100%);
      line-height: 1.7;
    }

    header {
      background: linear-gradient(135deg, #0f2f6b, #1d4ed8);
      color: white;
      padding: 38px 20px;
    }

    .header-inner {
      max-width: 920px;
      margin: 0 auto;
    }

    .back-link {
      color: white;
      text-decoration: none;
      font-size: 14px;
      opacity: 0.9;
    }

    h1 {
      margin: 18px 0 8px;
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.3;
    }

    .header-inner p {
      margin: 0;
      opacity: 0.9;
      font-size: 15px;
    }

    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 12px 32px rgba(30, 64, 175, 0.10);
      margin-bottom: 22px;
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 22px;
      color: #111827;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1f2937;
    }

    input {
      width: 100%;
      font-size: 18px;
      padding: 12px 14px;
      border: 1px solid #bfdbfe;
      border-radius: 12px;
      outline: none;
      background: #f8fbff;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.12);
      background: #fff;
    }

    .hint {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 20px;
      font-weight: 800;
      cursor: pointer;
      font-size: 14px;
    }

    .calc-btn {
      background: var(--blue);
      color: white;
    }

    .reset-btn {
      background: #e5e7eb;
      color: #111827;
    }

    .copy-btn {
      background: #ecfdf5;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .result {
      display: none;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 20px;
      padding: 22px;
      margin-top: 22px;
    }

    .result-main {
      font-size: clamp(30px, 6vw, 46px);
      font-weight: 900;
      color: var(--blue-dark);
      line-height: 1.2;
      margin: 8px 0;
    }

    .result-sub {
      color: #334155;
      font-size: 14px;
      margin: 0;
    }

    .explain {
      background: #ffffff;
      border: 1px solid #e5efff;
      border-radius: 18px;
      padding: 20px;
    }

    .explain h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .formula {
      background: #f8fbff;
      border-left: 5px solid var(--blue);
      padding: 14px 16px;
      border-radius: 12px;
      font-weight: 800;
      color: #0f2f6b;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 24px 20px;
      border-top: 1px solid #e5e7eb;
      background: white;
    }

    @media (max-width: 720px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      main {
        padding: 22px 14px 52px;
      }

      .card {
        padding: 20px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <a class="back-link" href="index.html">← ツールサイトへ戻る</a>
      <h1>必要売上計算ツール</h1>
      <p>支出額を回収するために、どれくらいの売上が必要かを限界利益率から逆算します。</p>
    </div>
  </header>

  <main>
    <section class="card">
      <h2>入力</h2>

      <div class="form-grid">
        <div>
          <label for="cost">支出額</label>
          <input id="cost" type="number" placeholder="例：300000" />
          <div class="hint">例：30万円の広告費なら 300000</div>
        </div>

        <div>
          <label for="margin">限界利益率（％）</label>
          <input id="margin" type="number" placeholder="例：40" />
          <div class="hint">例：限界利益率40％なら 40</div>
        </div>
      </div>

      <div class="button-row">
        <button class="calc-btn" onclick="calculate()">計算する</button>
        <button class="reset-btn" onclick="resetForm()">リセット</button>
        <button class="copy-btn" onclick="copyResult()">結果をコピー</button>
      </div>

      <div id="result" class="result">
        <p class="result-sub">必要売上高</p>
        <div id="salesResult" class="result-main">0円</div>
        <p id="detailResult" class="result-sub"></p>
      </div>
    </section>

    <section class="explain">
      <h2>計算式</h2>
      <p>支出額を回収するために必要な売上高を、限界利益率で割って計算します。</p>
      <div class="formula">必要売上高 ＝ 支出額 ÷ 限界利益率</div>
      <p>
        例：支出額30万円、限界利益率40％の場合<br>
        300,000円 ÷ 40％ ＝ 750,000円
      </p>
    </section>
  </main>

  <footer class="footer">
    © 2026 Precious Partners Tool Site
  </footer>

  <script>
    let latestText = "";

    function formatYen(value) {
      return Math.round(value).toLocaleString("ja-JP") + "円";
    }

    function calculate() {
      const cost = Number(document.getElementById("cost").value);
      const margin = Number(document.getElementById("margin").value);

      if (!cost || !margin || margin <= 0) {
        alert("支出額と限界利益率を正しく入力してください。");
        return;
      }

      const sales = cost / (margin / 100);

      document.getElementById("result").style.display = "block";
      document.getElementById("salesResult").textContent = formatYen(sales);
      document.getElementById("detailResult").textContent =
        "支出額 " + formatYen(cost) + " を回収するには、限界利益率 " + margin + "％ の場合、約 " + formatYen(sales) + " の売上が必要です。";

      latestText =
        "必要売上計算結果\n" +
        "支出額：" + formatYen(cost) + "\n" +
        "限界利益率：" + margin + "％\n" +
        "必要売上高：約 " + formatYen(sales);
    }

    function resetForm() {
      document.getElementById("cost").value = "";
      document.getElementById("margin").value = "";
      document.getElementById("result").style.display = "none";
      latestText = "";
    }

    function copyResult() {
      if (!latestText) {
        alert("先に計算してください。");
        return;
      }

      navigator.clipboard.writeText(latestText).then(function() {
        alert("結果をコピーしました。");
      });
    }
  </script>
</body>
</html>
